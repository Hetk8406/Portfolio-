<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background square with slight rounding -->
  <rect width="32" height="32" rx="6" fill="#0A0A0E"/>
  <!-- Subtle gradient inner border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="5.5" stroke="url(#borderGlow)" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Stylized premium monogram text "HK" -->
  <text x="16" y="21" font-family="'Syne', 'Outfit', 'Inter', system-ui, sans-serif" font-weight="900" font-size="12" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">HK</text>
  <!-- Accent dot -->
  <circle cx="23.5" cy="20.5" r="1.5" fill="#00F0FF" />
  
  <defs>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F0FF"/>
      <stop offset="0.5" stop-color="#5B21B6"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
</svg>
